<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>光影资讯</title>
    <style>
       
        * {
            margin: 0;
            padding: 0;
            list-style: none;
            border: 0;
        }

        #wrap {
            width: 600px;
            height: 400px;
            background: #ede9dd;
            margin: 30px auto;
            padding-top: 20px;
            border: 1px solid #ccc;
        }

        #wrap h2 {
            width: 600px;
            height: 37px;
            background: url("movie.jpg") no-repeat center center;
            text-indent: -9999px;  
        }

        #wrap ul li {
            width: 400px;
            height: 100px;
            border-top: 1px dotted #ccc;
            margin: 0 auto;
            background: url("star.jpg") no-repeat 10px 10px;
            padding: 10px 0 0 95px;  
        }

        #wrap ul li a:link,
        #wrap ul li a:visited {
            text-decoration: none;
            color: #903;
            font-size: 16px;
            font-weight: bold;
        }

        #wrap ul li a:hover {
            text-decoration: underline;
            color: #f96;
        }

        #wrap ul li p {
            margin-top: 10px;     
            font-size: 12px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div id="wrap">
    <h2>Movies</h2>
    <ul>
        <li>
            <a href="#">《变形金刚4——绝境逢生》（2014）</a>
            <p>
                芝加哥一战后,汽车人、霸天虎销声匿迹。一群天才科学家欲研发难以驾驭的新技术。
                而一个古老强大的变形金刚出现并威胁着人类，决战一触即发。
            </p>
        </li>

        <li>
            <a href="#">《罪恶之城2》（2014）</a>
            <p>
                芝加哥一战后,汽车人、霸天虎销声匿迹。一群天才科学家欲研发难以驾驭的新技术。
                而一个古老强大的变形金刚出现并威胁着人类，决战一触即发。
            </p>
        </li>

        <li>
            <a href="#">《加勒比海盗5》（2014）</a>
            <p>
                芝加哥一战后,汽车人、霸天虎销声匿迹。一群天才科学家欲研发难以驾驭的新技术。
                而一个古老强大的变形金刚出现并威胁着人类，决战一触即发。
            </p>
        </li>
    </ul>
</div>

</body>
</html>
