<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>团购样式</title>
    <style>
        body {
            background-color: #f5f5f5;
        }

        .box {
            width: 310px;
            padding: 15px;
            margin: 40px auto;
            border: 1px solid #ccc;
            background-color: #fff;
            position: relative;
        }

        /* 左上角角标 */
        .top {
            position: absolute;
            left: 0;
            top: 0;
        }

        /* 商品图 */
        .pic {
            margin-top: 20px;
        }

        .pic img {
            width: 100%;
        }

        /* 标题 */
        .title a {
            display: block;
            font-size: 14px;
            color: #000;
            text-decoration: none;
            line-height: 1.6;
            margin: 10px 0;
        }

        .title a:visited {
            color: #000;
        }

        .title a:hover {
            color: #339999;
            text-decoration: underline;
        }

        /* 价格 + 按钮 */
        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .price {
            color: #ff5500;
            font-size: 20px;
            font-weight: bold;
        }

        .price span {
            color: #999;
            font-size: 12px;
            text-decoration: line-through;
            margin-left: 5px;
        }

        /* 购买人数 */
        .count {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="box">

    <!-- 今日新单 -->
    <img src="images/top_tu.gif" class="top">

    <!-- 商品图片 -->
    <div class="pic">
        <a href="#">
            <img src="images/adv.jpg" alt="哈根达斯">
        </a>
    </div>

    <!-- 标题 -->
    <div class="title">
        <a href="#">
            【12店通用】领航冰品哈根达斯：冰淇淋双球，口味任选2种，节假通用
        </a>
    </div>

    <!-- 价格 + 按钮 -->
    <div class="info">
        <div class="price">
            ¥20.8 <span>原价¥38</span>
        </div>
        <a href="#">
            <img src="images/see.jpg" alt="去看看">
        </a>
    </div>

    <!-- 购买人数 -->
    <div class="count">
        32人已购买
    </div>

</div>

</body>
</html>
