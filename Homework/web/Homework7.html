<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作业7 - 页面跳转示例</title>
    <style>
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            margin: 0;
            padding: 30px 20px 60px;
            color: #333;
            background: #f6f6f6;
        }
        .wrapper {
            max-width: 1080px;
            margin: 0 auto;
            background: #fff;
            padding: 20px 24px 40px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        }
        .desc p {
            margin: 6px 0;
            line-height: 1.6;
        }
        .hero {
            text-align: center;
            margin: 18px 0 8px;
        }
        .hero img {
            width: 100%;
            max-width: 900px;
            border-radius: 6px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }
        .hero img:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.16);
        }
        .note {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="desc">
            <p>实验效果如下：</p>
            <p>利用超链接表实现网页的跳转</p>
            <p>点击图片实现页面的跳转与返回，效果如下：点击第一张图片跳转至第二个页面，点击返回可跳转回第一个页面</p>
        </div>

        <div class="hero">
            <a id="openPage2" href="Homework7-p2.html">
                <img src="img/img/banner.jpg" alt="吃在四川">
            </a>
        </div>
        <div class="note">点击上方图片弹出第二个页面</div>
    </div>

    <script>
        // 点击图片弹出第二个页面（新窗口/标签）
        document.getElementById('openPage2').addEventListener('click', function (e) {
            e.preventDefault();
            const win = window.open('Homework7-p2.html', '_blank', 'width=1200,height=780');
            // 若浏览器拦截弹窗，降级为当前页跳转
            if (!win) {
                window.location.href = 'Homework7-p2.html';
            }
        });
    </script>
</body>
</html>
