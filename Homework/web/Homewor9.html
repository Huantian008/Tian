<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>志愿者信息登记表</title>
    <style>
        :root {
            --main: #d32f2f;
            --border: #dcdfe6;
            --text: #333;
            --muted: #777;
            --bg: #f7f8fb;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 30px 15px 60px;
        }
        .card {
            max-width: 960px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            padding: 30px 28px 40px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .hint {
            color: var(--muted);
            margin-bottom: 24px;
        }
        form {
            display: grid;
            grid-template-columns: 180px 1fr;
            row-gap: 18px;
            column-gap: 20px;
            align-items: center;
        }
        label {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .required {
            color: var(--main);
        }
        input[type="text"],
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: var(--main);
            box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.12);
        }
        .inline {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .inline select {
            flex: 1;
            min-width: 180px;
        }
        .radio-group,
        .checkbox-group {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
        }
        input[type="radio"],
        input[type="checkbox"] {
            accent-color: var(--main);
            width: 16px;
            height: 16px;
        }
        .checkbox-group label {
            font-weight: normal;
            gap: 6px;
        }
        .footer {
            grid-column: 2 / 3;
            margin-top: 6px;
        }
        button {
            padding: 12px 28px;
            font-size: 16px;
            color: #fff;
            background: var(--main);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background: #b71c1c;
        }
        button:active {
            transform: translateY(1px);
        }
        @media (max-width: 720px) {
            form {
                grid-template-columns: 1fr;
            }
            label {
                margin-top: 4px;
            }
            .footer {
                grid-column: 1 / 2;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>志愿者信息登记表</h1>
        <p class="hint">请填写您的基本信息，标红字段为必填项。</p>
        <form>
            <label for="realname"><span class="required">*</span>真实姓名：</label>
            <input id="realname" type="text" placeholder="请输入真实姓名，只能填写中文！" required>

            <label for="id-type"><span class="required">*</span>证件类型：</label>
            <select id="id-type" required>
                <option>身份证</option>
                <option>护照</option>
                <option>军官证</option>
                <option>港澳台通行证</option>
            </select>

            <label for="id-number"><span class="required">*</span>证件号：</label>
            <input id="id-number" type="text" placeholder="请输入证件号" required>

            <label for="politics"><span class="required">*</span>政治面貌：</label>
            <select id="politics" required>
                <option disabled selected>请选择</option>
                <option>中共党员</option>
                <option>共青团员</option>
                <option>群众</option>
                <option>民主党派</option>
            </select>

            <label><span class="required">*</span>省直单位：</label>
            <div class="radio-group">
                <label><input type="radio" name="province-unit" value="否" checked> 否</label>
                <label><input type="radio" name="province-unit" value="是"> 是</label>
            </div>

            <label><span class="required">*</span>居住地区：</label>
            <div class="inline">
                <select aria-label="省份" required>
                    <option disabled selected>请选择省份</option>
                    <option>北京市</option>
                    <option>上海市</option>
                    <option>广东省</option>
                    <option>浙江省</option>
                    <option>江苏省</option>
                    <option>江西省</option>
                </select>
                <select aria-label="城市" required>
                    <option disabled selected>请选择城市</option>
                    <option>北京市</option>
                    <option>上海市</option>
                    <option>广州市</option>
                    <option>杭州市</option>
                    <option>苏州市</option>
                    <option>南昌市</option>
                </select>
            </div>

            <label for="address"><span class="required">*</span>地址：</label>
            <input id="address" type="text" placeholder="请输入街道地址" required>

            <label><span class="required">*</span>性别：</label>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="男" checked> 男</label>
                <label><input type="radio" name="gender" value="女"> 女</label>
            </div>

            <label for="nation"><span class="required">*</span>民族：</label>
            <select id="nation" required>
                <option disabled selected>请选择</option>
                <option>汉族</option>
                <option>回族</option>
                <option>藏族</option>
                <option>蒙古族</option>
                <option>维吾尔族</option>
            </select>

            <label><span class="required">*</span>擅长领域：</label>
            <div class="checkbox-group">
                <label><input type="checkbox"> 文化志愿者</label>
                <label><input type="checkbox"> 教育志愿者</label>
                <label><input type="checkbox"> 文明使志愿者</label>
                <label><input type="checkbox"> 助残志愿者</label>
                <label><input type="checkbox"> 医疗志愿者</label>
                <label><input type="checkbox"> 应急志愿者</label>
                <label><input type="checkbox"> 交通志愿者</label>
                <label><input type="checkbox"> 消防志愿者</label>
                <label><input type="checkbox"> 科普志愿者</label>
                <label><input type="checkbox"> 治安志愿者</label>
            </div>

            <label><span class="required">*</span>服务领域：</label>
            <div class="checkbox-group">
                <label><input type="checkbox"> 扶贫济困</label>
                <label><input type="checkbox"> 助老助残</label>
                <label><input type="checkbox"> 大型聚会</label>
                <label><input type="checkbox"> 抢险救灾</label>
                <label><input type="checkbox"> 社区服务</label>
                <label><input type="checkbox"> 社会管理</label>
                <label><input type="checkbox"> 教育培训</label>
                <label><input type="checkbox"> 西部开发</label>
            </div>

            <label for="occupation">从业情况：</label>
            <select id="occupation">
                <option disabled selected>请选择</option>
                <option>在职</option>
                <option>自由职业</option>
                <option>学生</option>
                <option>退休</option>
            </select>

            <label for="education">教育程度：</label>
            <select id="education">
                <option disabled selected>请选择</option>
                <option>高中及以下</option>
                <option>大专</option>
                <option>本科</option>
                <option>硕士</option>
                <option>博士及以上</option>
            </select>

            <label for="company">所在单位/学校：</label>
            <input id="company" type="text" placeholder="请输入您所在单位/学校的名称">

            <div class="footer">
                <button type="submit">提交</button>
            </div>
        </form>
    </div>
</body>
</html>
